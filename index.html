<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Үл хөдлөх</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="header"></div>
  <nav>
    <div id="search-bar"></div>
  </nav>
  <main>
    <aside>
      <h2>SALE</h2>
      <div id="selling">
        <div class="ad"><img src="images/app image.jpg" alt="app_image">
          <div class="info">
            <p class="price">100.000.000₮</p>
            <p class="room">1 өрөө</p>
            <p class="area">30 мкв</p>
            <p class="address">БГД, 11-р хороо, 4-р хорооло, 76-р байр</p>
          </div>
        </div>
        <div class="ad"><img src="images/app image.jpg" alt="app_image"></div>
        <div class="ad"><img src="images/app image.jpg" alt="app_image"></div>
      </div>
      <h2>RENT</h2>
      <div id="renting">
        <div class="ad"><img src="images/app image.jpg" alt="app_image">
          <div class="info">
            <p class="price">1.000.000₮</p>
            <p class="room">1 өрөө</p>
            <p class="area">30 мкв</p>
            <p class="address">БГД, 11-р хороо, 4-р хорооло, 76-р байр</p>
          </div>
        </div>
        <div class="ad"><img src="images/app image.jpg" alt="app_image"></div>
        <div class="ad"><img src="images/app image.jpg" alt="app_image"></div>
      </div>
    </aside>
    <div id="options">
      <section>
        <div class="image"></div>
        <h2>Худалдах</h2>
        <h3>Түр амьдрах орон сууц, байшинг хялбар шуурхай хайх</h3>
        <button type="button" class="option-btn">Үзэх</button>
      </section>
      <section>
        <div class="image"></div>
        <button type="button" class="option-btn">Үзэх</button>
      </section>
      <section>
        <div class="image"></div>
        <button type="button" class="option-btn">Зарах</button>
      </section>
      <section>
        <div class="image"></div>
        <button type="button" class="option-btn">Түрээслэх</button>
      </section>
    </div>
  </main>
  <footer></footer>
  <script src="loadHeader.js"></script>
</body>
</html>
